<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интересующие услуги</title>
<script src="//api.bitrix24.com/api/v1/"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#7c3aed; --primary-hover:#6d28d9; --primary-light:#ede9fe; --primary-bg:#f5f3ff;
  --bg:#faf5ff; --card:#fff; --text:#1f2937; --text-secondary:#6b7280; --text-muted:#9ca3af;
  --border:#e5e7eb; --border-light:#f3f4f6; --success:#059669; --success-bg:#ecfdf5;
  --error:#dc2626; --error-bg:#fef2f2;
  --svc-accent:#4f46e5; --svc-bg:#eef2ff; --svc-text:#3730a3;
  --sch-accent:#059669; --sch-bg:#ecfdf5; --sch-text:#065f46;
  --busy:#d1fae5; --busy-border:#6ee7b7; --busy-text:#065f46;
  --radius:12px; --radius-sm:8px; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rubik',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;padding:16px;min-height:100vh}
#app{max-width:1400px;margin:0 auto}

.screen-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;text-align:center;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-banner{background:var(--error-bg);color:var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:13px}
.ok-banner{background:var(--success-bg);color:var(--success);border:1px solid #a7f3d0;padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:14px;font-weight:600}

/* prompt (лид не сохранён) */
.prompt{background:var(--card);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow);text-align:center}
.prompt .ic{font-size:48px;margin-bottom:12px}
.prompt .t{font-weight:700;font-size:17px;margin-bottom:10px}
.prompt .d{color:var(--text-secondary);font-size:14px;line-height:1.7;max-width:520px;margin:0 auto;text-align:left}
.prompt .d b{color:var(--text)}
.prompt ol{margin:10px 0 0 20px}

/* client */
.client-card{background:var(--primary-bg);border:1px solid var(--primary-light);border-left:4px solid var(--primary);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.client-info{flex:1}
.client-name{font-weight:700;font-size:16px;color:var(--primary-hover)}
.client-meta{color:var(--text-secondary);font-size:13px}
.client-meta.warn{color:var(--error);font-weight:600}
.client-badge{background:var(--primary);color:#fff;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600}

/* accordion */
.acc{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.acc-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;font-weight:600}
.acc-head .num{font-size:18px}
.acc-head .ttl{font-size:14px}
.acc-head .sub{margin-left:auto;font-weight:500;font-size:13px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52%}
.acc-head .chev{transition:transform .15s;font-size:12px;margin-left:6px}
.acc.open .acc-head .chev{transform:rotate(90deg)}
.acc-head.services{background:var(--svc-bg);color:var(--svc-text);border-left:4px solid var(--svc-accent)}
.acc-head.schedule{background:var(--sch-bg);color:var(--sch-text);border-left:4px solid var(--sch-accent)}
.acc-body{display:none}
.acc.open .acc-body{display:block}

.svc-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--border-light)}
.svc-row:hover{background:var(--svc-bg)}
.svc-check{width:18px;height:18px;cursor:pointer;accent-color:var(--svc-accent)}
.svc-row .nm{flex:1;cursor:pointer}
.svc-row.on .nm{font-weight:600;color:var(--svc-text)}
.svc-row .mt{color:var(--text-muted);font-size:12px;white-space:nowrap}
.svc-row .pr{font-weight:600;white-space:nowrap}
.svc-row .rm{background:transparent;color:var(--text-muted);border:none;cursor:pointer;padding:2px 6px;font-size:16px}
.svc-row .rm:hover{color:var(--error)}
.svc-empty{padding:18px 16px;text-align:center;color:var(--text-muted);font-size:13px;border-top:1px solid var(--border-light)}
.svc-addbox{padding:10px 16px;border-top:1px solid var(--border-light)}
.svc-addin{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;outline:none;font-family:'Rubik',sans-serif}
.svc-addin:focus{border-color:var(--svc-accent)}
.svc-addin::placeholder{font-family:Georgia,'Times New Roman',serif;font-style:italic;color:rgba(79,70,229,.4);opacity:1;font-size:13px}
.svc-addres{margin-top:8px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.svc-additem{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-top:1px solid var(--border-light)}
.svc-additem:first-child{border-top:none}
.svc-additem:hover{background:var(--svc-bg)}
.svc-addplus{margin-left:auto;background:var(--svc-bg);color:var(--svc-accent);border-radius:var(--radius-sm);padding:3px 9px;font-size:13px;font-weight:600}
.svc-sum{padding:10px 16px;border-top:1px solid var(--border-light);display:flex;gap:16px;font-size:13px;background:var(--svc-bg);flex-wrap:wrap}
.svc-sum b{color:var(--svc-accent)}

.bk-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border)}
.bk-nav{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer;font-size:14px;font-weight:500}
.bk-nav:hover{border-color:var(--sch-accent);color:var(--sch-text)}
.bk-date{font-weight:600;font-size:15px;min-width:170px;text-align:center}
.bk-filter{margin-left:auto;display:flex;align-items:center;gap:8px}
.bk-filter select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:14px;outline:none;cursor:pointer;background:var(--card)}

.grid-wrap{overflow:visible}
table.grid{border-collapse:collapse;width:100%;table-layout:fixed}
table.grid th,table.grid td{border:1px solid var(--border-light)}
table.grid thead th{background:var(--sch-bg);padding:9px 6px;font-size:13px;font-weight:600;color:var(--text)}
table.grid thead th .spec{display:block;font-weight:400;font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-time{width:60px}
td.time{background:var(--sch-bg);color:var(--text-secondary);font-size:11px;text-align:center;width:56px;height:22px;vertical-align:top;padding-top:1px}
td.free{height:22px;cursor:pointer;transition:background .1s}
td.hourline{border-top:1.5px solid #cbd5e1 !important}
td.free:hover{background:var(--primary-light)}
td.free.sel{background:var(--primary);outline:2px solid var(--primary-hover);outline-offset:-2px}
td.busy{background:var(--busy);border-color:var(--busy-border);color:var(--busy-text);font-size:11px;line-height:1.3;padding:4px 6px;vertical-align:top}
td.busy .b-time{font-weight:600}
td.busy .b-client{font-weight:600}
td.busy .b-svc{color:#047857;font-size:10px;display:block;overflow:hidden}
.grid-msg{padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px}

.confirm{background:var(--card);border:2px solid var(--primary);border-radius:var(--radius);box-shadow:0 6px 20px rgba(124,58,237,.18);padding:16px 18px;margin-bottom:14px}
.confirm-title{font-weight:700;font-size:15px;margin-bottom:10px;color:var(--primary)}
.confirm-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13px;margin-bottom:12px}
.confirm-grid .k{color:var(--text-secondary)}
.confirm-grid .v{font-weight:500}
.btn-row{display:flex;gap:10px}
.btn{flex:1;border:none;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:disabled{background:var(--text-muted);cursor:not-allowed}
.btn-ghost{flex:0 0 auto;background:var(--card);border:1px solid var(--border);color:var(--text-secondary)}
.btn-ghost:hover{border-color:var(--error);color:var(--error)}
.hint{color:var(--text-muted);font-size:12px;margin-top:8px}
</style>
</head>
<body>
<div id="app"><div class="screen-center"><div class="spinner"></div><div>Загрузка...</div></div></div>

<script>
// =============================================
// BEAUTY CLINIC — LEAD WIDGET v3.0 (Виджет-06)
// Один экран: клиент + услуги + журнал записи. Запись через YC API (контакт из лида).
// =============================================

var PROXY_URL = 'https://144-124-253-45.nip.io/api/proxy';
var FILIAL_TO_COMPANY = { 669: 671663, 671: 816356 };
var FILIAL_NAMES = { 669: 'Махачкала', 671: 'Грозный' };
var FIELD_FILIAL = 'UF_CRM_BRANCH_AUTO';

var BK_START_MIN = 540;   // 9:00
var BK_END_MIN = 1110;    // 18:30
var BK_STEP = 15;         // шаг сетки, мин (как в YC)
var BK_SLOTS = (BK_END_MIN - BK_START_MIN) / BK_STEP + 1;

var state = {
  leadId: null,
  contactId: null,
  companyId: null,
  branchName: '',
  clientName: '',
  clientPhone: '',
  services: [],          // каталог YC
  addedRows: [],         // услуги в лиде (товарные строки): {id, yc_id, name, price, booked}
  categories: [],        // категории услуг YC
  selectedCategoryId: null,
  catListOpen: false,    // свёрнут ли список категорий
  search: '',            // поиск в ① для добавления
  loading: false,
  error: '',
  bk: {                  // журнал
    staff: [], staffLoaded: false,
    date: '', records: [], recordsError: '',
    filterStaff: null, selected: null,
    openServices: false, openSchedule: false,
    creating: false, createdMsg: ''
  }
};

function bx24Call(method, params) {
  return new Promise(function(resolve, reject) {
    BX24.callMethod(method, params || {}, function(result) {
      if (result.error()) {
        var err = result.error();
        reject(new Error(err.ex ? (err.ex.error_description || err.ex.error) : 'BX24 error'));
      } else resolve(result.data());
    });
  });
}

function ycRequest(path, query) {
  return fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'yclients', path:path, method:'GET', query: query || {} }) })
   .then(function(r){return r.json();})
   .then(function(resp){ if(!resp.ok) throw new Error(resp.error||'Ошибка прокси'); var yc=resp.result; if(yc&&yc.success===false) throw new Error((yc.meta&&yc.meta.message)||'Ошибка YCLIENTS'); return yc; });
}
function ycPost(path, body) {
  return fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'yclients', path:path, method:'POST', body: body }) })
   .then(function(r){return r.json();})
   .then(function(resp){ if(!resp.ok) throw new Error(resp.error||'Ошибка прокси'); var yc=resp.result; if(yc&&yc.success===false) throw new Error((yc.meta&&yc.meta.message)||'Ошибка YCLIENTS'); return yc; });
}

function formatPhone(phone) {
  var d = (phone || '').replace(/\D/g, '');
  if (d.length === 11) return '+' + d[0] + ' (' + d.substr(1,3) + ') ' + d.substr(4,3) + '-' + d.substr(7,2) + '-' + d.substr(9,2);
  return phone;
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function serviceDuration(ycId){ var s=state.services.find(function(x){return x.id===ycId;}); return (s&&Number(s.duration))?Number(s.duration):3600; }

// ---------- загрузка ----------
async function loadData() {
  var lead = await bx24Call('crm.lead.get', { id: state.leadId });
  state.clientName = (lead.NAME || lead.LAST_NAME || lead.TITLE || 'Клиент');
  if (lead.PHONE && lead.PHONE.length > 0) state.clientPhone = lead.PHONE[0].VALUE || '';
  state.contactId = lead.CONTACT_ID || null;

  if (state.contactId) {
    try {
      var ct = await bx24Call('crm.contact.get', { id: state.contactId });
      var cname = [ct.NAME, ct.LAST_NAME].filter(Boolean).join(' ').trim();
      if (cname) state.clientName = cname;
      if (!state.clientPhone && ct.PHONE && ct.PHONE.length > 0) state.clientPhone = ct.PHONE[0].VALUE || '';
    } catch (e) { /* ignore */ }
  }

  var filialVal = lead[FIELD_FILIAL];
  if (Array.isArray(filialVal)) filialVal = filialVal[0];
  filialVal = parseInt(filialVal, 10);
  state.companyId = FILIAL_TO_COMPANY[filialVal] || 671663;
  state.branchName = FILIAL_NAMES[filialVal] || 'Махачкала (филиал не выбран)';

  var ycServ = await ycRequest('company/' + state.companyId + '/services');
  state.services = (ycServ.data || []).filter(function(s){ return s.active !== false; })
    .sort(function(a,b){ return (a.title||'').localeCompare(b.title||'', 'ru'); });

  // Категории услуг (для выбора как в YC — браузинг по категориям)
  var ycCat = await ycRequest('service_categories/' + state.companyId);
  var cats = (ycCat.data || []).filter(function(c){ return c.id !== 1; });
  var counts = {};
  state.services.forEach(function(s){ counts[s.category_id] = (counts[s.category_id]||0)+1; });
  state.categories = cats.map(function(c){ return { id: c.id, title: c.title, count: counts[c.id]||0 }; })
    .filter(function(c){ return c.count>0; })
    .sort(function(a,b){ return a.title.localeCompare(b.title,'ru'); });

  var rows = await bx24Call('crm.lead.productrows.get', { id: state.leadId });
  state.addedRows = (rows || []).map(function(r) {
    var name = r.PRODUCT_NAME || '';
    var booked = name.indexOf('✓ ') === 0;
    var cleanName = booked ? name.slice(2) : name;
    var svc = state.services.find(function(s){ return s.title === cleanName; });
    return { id: r.ID || null, yc_id: svc ? svc.id : null, booked: booked, name: cleanName, price: parseFloat(r.PRICE) || 0 };
  });

  state.bk.date = bkTodayStr();
  try { await loadStaff(); await loadDayRecords(); }
  catch (e) { state.bk.recordsError = e.message || 'Журнал не загрузился'; }
}

async function loadStaff() {
  var resp = await ycRequest('company/' + state.companyId + '/staff');
  state.bk.staff = (resp.data || []).filter(function(s){ return !s.fired && !s.hidden; })
    .map(function(s){ return { id: s.id, name: s.name, spec: s.specialization || '' }; });
  state.bk.staffLoaded = true;
}
async function loadDayRecords() {
  state.bk.recordsError = '';
  var d = state.bk.date;
  var resp = await ycRequest('records/' + state.companyId, { start_date: d, end_date: d });
  state.bk.records = (resp.data || []).map(function(r){
    return { staff_id: r.staff_id, datetime: r.datetime, seance_length: r.seance_length || r.length || 3600,
             client: (r.client && r.client.name) || '', services: (r.services||[]).map(function(s){return s.title;}) };
  });
}

async function saveRows() {
  if (!state.leadId) return;
  var rows = state.addedRows.map(function(r){ return { PRODUCT_NAME: (r.booked ? '✓ ' : '') + r.name, PRICE: r.price, QUANTITY: 1 }; });
  await bx24Call('crm.lead.productrows.set', { id: state.leadId, rows: rows });
}

// ---------- booking helpers ----------
function bkPad(n){ return n<10 ? '0'+n : ''+n; }
function bkTodayStr(){ var d=new Date(); return d.getFullYear()+'-'+bkPad(d.getMonth()+1)+'-'+bkPad(d.getDate()); }
function bkSlotTime(i){ var m=BK_START_MIN+i*BK_STEP; return bkPad(Math.floor(m/60))+':'+bkPad(m%60); }
function bkDtToSlot(dt){ var hh=+dt.substr(11,2), mm=+dt.substr(14,2); return Math.round((hh*60+mm-BK_START_MIN)/BK_STEP); }
function bkSpan(len){ return Math.max(1, Math.ceil(len/(BK_STEP*60))); }
function bkMoney(n){ return n.toLocaleString('ru-RU')+' ₽'; }
function bkDur(sec){ var h=Math.floor(sec/3600), m=Math.floor(sec%3600/60); var r=(h?h+' ч ':'')+(m?m+' мин':''); return r.trim()||'0'; }
function bkDdmm(s){ var mn=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря']; var d=new Date(s+'T12:00:00'); return d.getDate()+' '+mn[d.getMonth()]; }
function bkWeekday(s){ var w=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота']; return w[new Date(s+'T12:00:00').getDay()]; }
function bkShift(s,days){ var d=new Date(s+'T12:00:00'); d.setDate(d.getDate()+days); return d.getFullYear()+'-'+bkPad(d.getMonth()+1)+'-'+bkPad(d.getDate()); }
function bkStaffName(id){ var s=state.bk.staff.find(function(x){return x.id===id;}); return s?s.name:''; }
function bkBookedRows(){ return state.addedRows.filter(function(r){ return r.booked; }); }
function bkBookable(){ return state.addedRows.filter(function(r){ return r.booked && r.yc_id; }); }
function bkTotalDur(){ return bkBookable().reduce(function(a,r){ return a+serviceDuration(r.yc_id); }, 0); }
function bkTotalPrice(){ return bkBookedRows().reduce(function(a,r){ return a+(r.price||0); }, 0); }
function bkVisibleStaff(){ return state.bk.filterStaff ? state.bk.staff.filter(function(s){return s.id===state.bk.filterStaff;}) : state.bk.staff; }
function bkBusyMap(staffId){
  var map={};
  state.bk.records.filter(function(r){return r.staff_id===staffId;}).forEach(function(r){
    var st=bkDtToSlot(r.datetime); if(st<0||st>=BK_SLOTS) return;
    var sp=bkSpan(r.seance_length);
    map[st]={type:'start',rec:r,span:Math.min(sp,BK_SLOTS-st)};
    for(var k=1;k<sp && st+k<BK_SLOTS;k++) map[st+k]={type:'cont'};
  });
  return map;
}

// ---------- render ----------
function renderPrompt() {
  document.getElementById('app').innerHTML =
    '<div class="prompt"><div class="ic">📝</div><div class="t">Сначала сохрани лид с клиентом</div>' +
    '<div class="d">Чтобы появился журнал записи и услуги начали сохраняться:<ol>' +
    '<li>Впиши <b>имя</b> и <b>телефон</b> клиента в карточке лида (поле «Клиент»/«Контакт»)</li>' +
    '<li>Поставь <b>Филиал</b> (Махачкала / Грозный)</li>' +
    '<li>Нажми <b>«Сохранить»</b> внизу карточки</li>' +
    '</ol><div style="margin-top:12px;color:var(--text-muted)">После сохранения эта вкладка сама обновится — появятся услуги и журнал записи.</div></div></div>';
  autoResize();
}

function render() {
  if (!state.leadId) { renderPrompt(); return; }

  var b = state.bk;
  var bookedRows = bkBookedRows();
  var bookable = bkBookable();
  var hasPhone = !!(state.clientPhone || '').replace(/\D/g,'');
  var html = '';

  if (!hasPhone) html += '<div class="error-banner">⚠ У клиента нет телефона — добавь в контакт лида, иначе запись не создать.</div>';
  if (state.error) html += '<div class="error-banner">⚠ ' + escapeHtml(state.error) + '</div>';
  if (b.createdMsg) html += '<div class="ok-banner">✅ ' + escapeHtml(b.createdMsg) + '<div style="font-weight:400;font-size:12px;margin-top:4px">Запись ушла в YC с контактом клиента. Сделка появится автоматически.</div></div>';

  // ① услуги
  var selNames = bookedRows.length ? bookedRows.map(function(r){return r.name;}).join(', ') : 'ничего не отмечено';
  html += '<div class="acc' + (b.openServices?' open':'') + '"><div class="acc-head services" data-acc="services">';
  html += '<span class="num">①</span><span class="ttl">Услуги (обсуждаем / записываем)</span>';
  html += '<span class="sub">' + bookedRows.length + ' на запись · ' + bkMoney(bkTotalPrice()) + '</span><span class="chev">▶</span></div>';
  html += '<div class="acc-body">';
  if (state.addedRows.length === 0) {
    html += '<div class="svc-empty">Услуг пока нет. Найди и добавь ниже — отмечай галочкой те, на которые записываем.</div>';
  }
  state.addedRows.forEach(function(r, idx){
    html += '<div class="svc-row' + (r.booked?' on':'') + '">';
    html += '<input type="checkbox" class="svc-check" data-booked="' + idx + '" ' + (r.booked?'checked':'') + ' title="Записать на эту услугу">';
    html += '<span class="nm">' + escapeHtml(r.name) + (r.yc_id?'':' <span style="color:var(--error);font-size:11px">(нет в каталоге YC)</span>') + '</span>';
    html += '<span class="mt">' + (r.yc_id?bkDur(serviceDuration(r.yc_id)):'') + '</span>';
    html += '<span class="pr">' + bkMoney(r.price||0) + '</span>';
    html += '<button class="rm" data-remove="' + idx + '" title="Убрать">×</button></div>';
  });
  html += '<div class="svc-addbox"><input type="text" class="svc-addin" id="svc-search" placeholder="Поиск услуги по названию (или выбери категорию ниже)..." value="' + escapeHtml(state.search) + '">';
  var q = state.search.toLowerCase().trim();
  var have = state.addedRows.map(function(r){return r.yc_id;});
  if (q.length >= 2) {
    // режим поиска по всем услугам
    var found = state.services.filter(function(s){ return (s.title||'').toLowerCase().indexOf(q)>-1 && have.indexOf(s.id)===-1; }).slice(0,30);
    html += '<div class="svc-addres">';
    if (!found.length) html += '<div class="svc-additem" style="color:var(--text-muted)">Ничего не найдено</div>';
    found.forEach(function(s){ var p=s.price_min||s.price||0; html += '<div class="svc-additem" data-add="' + s.id + '"><span>' + escapeHtml(s.title) + '</span><span class="mt">' + bkMoney(p) + '</span><span class="svc-addplus">+ добавить</span></div>'; });
    html += '</div>';
  } else if (q.length === 1) {
    html += '<div class="hint">Введите минимум 2 буквы или открой категории ниже</div>';
  } else {
    // сворачиваемый список категорий (как «Все услуги» в YC)
    html += '<div data-catlist-toggle style="margin-top:8px;padding:9px 12px;background:var(--svc-bg);border-radius:var(--radius-sm);cursor:pointer;font-weight:600;color:var(--svc-text);display:flex;justify-content:space-between;align-items:center"><span>Все категории услуг</span><span>' + (state.catListOpen?'▾':'▸') + '</span></div>';
    if (state.catListOpen && state.selectedCategoryId === null) {
      html += '<div class="svc-addres">';
      state.categories.forEach(function(c){ html += '<div class="svc-additem" data-cat="' + c.id + '"><span>' + escapeHtml(c.title) + '</span><span class="mt">' + c.count + ' услуг</span><span class="svc-addplus">›</span></div>'; });
      html += '</div>';
    } else if (state.catListOpen) {
      var cat = state.categories.find(function(c){return c.id===state.selectedCategoryId;});
      var catSvc = state.services.filter(function(s){ return s.category_id===state.selectedCategoryId && have.indexOf(s.id)===-1; });
      html += '<div class="svc-additem" data-cat-back="1" style="margin-top:6px;background:var(--svc-bg);font-weight:600;border-radius:var(--radius-sm)"><span>‹ Все категории</span><span class="mt">' + escapeHtml(cat?cat.title:'') + '</span></div>';
      html += '<div class="svc-addres">';
      if (!catSvc.length) html += '<div class="svc-additem" style="color:var(--text-muted)">Все услуги категории уже добавлены</div>';
      catSvc.forEach(function(s){ var p=s.price_min||s.price||0; html += '<div class="svc-additem" data-add="' + s.id + '"><span>' + escapeHtml(s.title) + '</span><span class="mt">' + bkMoney(p) + '</span><span class="svc-addplus">+ добавить</span></div>'; });
      html += '</div>';
    }
  }
  html += '</div>';
  html += '<div class="svc-sum">На запись: <b>' + bookedRows.length + '</b> · Длительность: <b>' + (bkTotalDur()?bkDur(bkTotalDur()):'—') + '</b> · Сумма: <b>' + bkMoney(bkTotalPrice()) + '</b></div>';
  html += '</div></div>';

  // ② журнал
  html += '<div class="acc' + (b.openSchedule?' open':'') + '"><div class="acc-head schedule" data-acc="schedule">';
  html += '<span class="num">②</span><span class="ttl">Журнал — выбрать время</span>';
  html += '<span class="sub">' + bkDdmm(b.date) + ', ' + bkWeekday(b.date) + (b.filterStaff?' · '+escapeHtml(bkStaffName(b.filterStaff)):'') + '</span><span class="chev">▶</span></div>';
  html += '<div class="acc-body">';
  html += '<div class="bk-toolbar"><button class="bk-nav" data-bk-nav="today">Сегодня</button><button class="bk-nav" data-bk-nav="-1">‹</button>';
  html += '<div class="bk-date">' + bkDdmm(b.date) + ', ' + bkWeekday(b.date) + '</div><button class="bk-nav" data-bk-nav="1">›</button>';
  html += '<div class="bk-filter"><span style="color:var(--text-secondary);font-size:13px">Врач:</span><select id="bk-staff-sel"><option value="">Все врачи</option>';
  state.bk.staff.forEach(function(s){ html += '<option value="' + s.id + '" ' + (b.filterStaff===s.id?'selected':'') + '>' + escapeHtml(s.name) + '</option>'; });
  html += '</select></div></div>';

  if (b.recordsError) {
    html += '<div class="grid-msg" style="color:var(--error)">⚠ ' + escapeHtml(b.recordsError) + '</div>';
  } else if (!state.bk.staff.length) {
    html += '<div class="grid-msg">Врачи не загрузились</div>';
  } else {
    var staff = bkVisibleStaff();
    var maps = {}; staff.forEach(function(s){ maps[s.id] = bkBusyMap(s.id); });
    html += '<div class="grid-wrap"><table class="grid"><thead><tr><th class="col-time"></th>';
    staff.forEach(function(s){ html += '<th>' + escapeHtml(s.name) + '<span class="spec">' + escapeHtml(s.spec) + '</span></th>'; });
    html += '<th class="col-time"></th></tr></thead><tbody>';
    for (var r = 0; r < BK_SLOTS; r++) {
      var mins = BK_START_MIN + r*BK_STEP;
      var lbl = (mins % 30 === 0) ? bkSlotTime(r) : '';
      var hl = (mins % 60 === 0) ? ' hourline' : '';
      html += '<tr><td class="time' + hl + '">' + lbl + '</td>';
      staff.forEach(function(s){
        var cell = maps[s.id][r];
        if (cell && cell.type === 'cont') return;
        if (cell && cell.type === 'start') {
          var rec = cell.rec;
          html += '<td class="busy' + hl + '" rowspan="' + cell.span + '"><div class="b-time">' + rec.datetime.substr(11,5) + '</div><div class="b-client">' + escapeHtml(rec.client||'Занято') + '</div><span class="b-svc">' + escapeHtml(rec.services.join(', ')) + '</span></td>';
        } else {
          var isSel = b.selected && b.selected.staffId===s.id && b.selected.slot===r;
          html += '<td class="free' + (isSel?' sel':'') + hl + '" data-bk-staff="' + s.id + '" data-bk-slot="' + r + '"></td>';
        }
      });
      html += '<td class="time' + hl + '">' + lbl + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }
  html += '</div></div>';

  // ③ подтверждение
  if (b.selected) {
    var canBook = bookable.length > 0 && hasPhone && !b.creating;
    html += '<div class="confirm"><div class="confirm-title">Подтверждение записи</div><div class="confirm-grid">';
    html += '<div class="k">Клиент</div><div class="v">' + escapeHtml(state.clientName) + (hasPhone?' · '+escapeHtml(formatPhone(state.clientPhone)):' · <span style="color:var(--error)">нет телефона</span>') + '</div>';
    html += '<div class="k">Услуги</div><div class="v">' + (bookable.length?escapeHtml(bookable.map(function(r){return r.name;}).join(', ')):'<span style="color:var(--error)">не отмечены</span>') + '</div>';
    html += '<div class="k">Врач</div><div class="v">' + escapeHtml(bkStaffName(b.selected.staffId)) + '</div>';
    html += '<div class="k">Дата и время</div><div class="v">' + bkDdmm(b.date) + ', ' + bkSlotTime(b.selected.slot) + '</div>';
    html += '<div class="k">Длительность</div><div class="v">' + (bkTotalDur()?bkDur(bkTotalDur()):'—') + '</div>';
    html += '<div class="k">Сумма</div><div class="v">' + bkMoney(bkTotalPrice()) + '</div></div>';
    html += '<div class="btn-row"><button class="btn btn-primary" id="bk-create" ' + (canBook?'':'disabled') + '>' + (b.creating?'Создаю…':'Создать запись') + '</button><button class="btn btn-ghost" id="bk-cancel">Отмена</button></div>';
    if (!bookable.length) html += '<div class="hint">↑ В блоке ① отметь галочками услуги, на которые записываем.</div>';
    else if (!hasPhone) html += '<div class="hint">↑ Добавь телефон клиента в контакт лида — без него запись не создать.</div>';
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
  autoResize();
  bindAll();
}

function bindAll() {
  document.querySelectorAll('[data-acc]').forEach(function(h){
    h.addEventListener('click', function(){
      var k = h.getAttribute('data-acc');
      if (k==='services') state.bk.openServices=!state.bk.openServices; else state.bk.openSchedule=!state.bk.openSchedule;
      render();
    });
  });

  var si = document.getElementById('svc-search');
  if (si) si.addEventListener('input', function(e){ state.search=e.target.value; render(); var x=document.getElementById('svc-search'); if(x){x.focus();x.setSelectionRange(x.value.length,x.value.length);} });

  document.querySelectorAll('[data-add]').forEach(function(el){
    el.addEventListener('click', function(){
      var id = parseInt(el.getAttribute('data-add'), 10);
      var svc = state.services.find(function(s){return s.id===id;});
      if (!svc) return;
      state.addedRows.push({ yc_id: svc.id, name: svc.title, price: svc.price_min||svc.price||0, booked: false });
      state.search = '';
      render();
      saveRows().catch(function(e){ state.error='Не сохранилось в лид: '+e.message; render(); });
    });
  });

  var clt = document.querySelector('[data-catlist-toggle]');
  if (clt) clt.addEventListener('click', function(){ state.catListOpen = !state.catListOpen; if (!state.catListOpen) state.selectedCategoryId = null; render(); });
  document.querySelectorAll('[data-cat]').forEach(function(el){
    el.addEventListener('click', function(){ state.selectedCategoryId = parseInt(el.getAttribute('data-cat'),10); render(); });
  });
  var catBack = document.querySelector('[data-cat-back]');
  if (catBack) catBack.addEventListener('click', function(){ state.selectedCategoryId = null; render(); });

  document.querySelectorAll('[data-remove]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var idx = parseInt(btn.getAttribute('data-remove'), 10);
      state.addedRows.splice(idx, 1);
      render();
      saveRows().catch(function(e){ state.error='Не сохранилось в лид: '+e.message; render(); });
    });
  });

  document.querySelectorAll('[data-booked]').forEach(function(cb){
    cb.addEventListener('change', function(){
      var idx = parseInt(cb.getAttribute('data-booked'), 10);
      state.addedRows[idx].booked = cb.checked;
      render();
      saveRows().catch(function(e){ state.error='Не сохранилось в лид: '+e.message; render(); });
    });
  });

  document.querySelectorAll('[data-bk-nav]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var v = btn.getAttribute('data-bk-nav');
      state.bk.date = (v==='today') ? bkTodayStr() : bkShift(state.bk.date, parseInt(v,10));
      state.bk.selected = null;
      render();
      loadDayRecords().then(render).catch(function(e){ state.bk.recordsError=e.message; render(); });
    });
  });

  var ss = document.getElementById('bk-staff-sel');
  if (ss) ss.addEventListener('change', function(){ state.bk.filterStaff = ss.value?parseInt(ss.value,10):null; state.bk.selected=null; render(); });

  document.querySelectorAll('td.free').forEach(function(td){
    td.addEventListener('click', function(){ state.bk.selected = { staffId: parseInt(td.getAttribute('data-bk-staff'),10), slot: parseInt(td.getAttribute('data-bk-slot'),10) }; render(); });
  });

  var bc = document.getElementById('bk-create'); if (bc) bc.addEventListener('click', createBooking);
  var bx = document.getElementById('bk-cancel'); if (bx) bx.addEventListener('click', function(){ state.bk.selected=null; render(); });
}

async function createBooking() {
  var b = state.bk;
  var bookable = bkBookable();
  if (!bookable.length || !b.selected) return;
  if (!(state.clientPhone||'').replace(/\D/g,'')) { state.error='У клиента нет телефона'; render(); return; }
  b.creating = true; state.error=''; render();
  try {
    var body = {
      staff_id: b.selected.staffId,
      services: bookable.map(function(r){ return { id: r.yc_id, amount: 1 }; }),
      client: { phone: state.clientPhone, name: state.clientName },
      datetime: b.date + 'T' + bkSlotTime(b.selected.slot) + ':00+03:00',
      seance_length: bkTotalDur() || 3600,
      save_if_busy: false
    };
    var resp = await ycPost('records/' + state.companyId, body);
    var data = resp.data;
    var recId = Array.isArray(data) ? (data[0] && data[0].id) : (data && data.id);
    if (!recId) throw new Error('YC не вернул ID записи');
    b.creating = false;
    b.createdMsg = 'Запись создана: ' + bkDdmm(b.date) + ' ' + bkSlotTime(b.selected.slot) + ', ' + bkStaffName(b.selected.staffId);
    b.selected = null;
    render();
  } catch (e) {
    b.creating = false;
    var msg = e.message || 'не удалось создать запись';
    if (/busy|занят/i.test(msg)) { state.error='Этот слот только что заняли — выбери другое время.'; b.selected=null; loadDayRecords().then(render).catch(function(){render();}); return; }
    state.error = 'Ошибка создания записи: ' + msg;
    render();
  }
}

function renderError(msg) {
  document.getElementById('app').innerHTML = '<div class="screen-center"><div style="font-size:48px;">⚠</div><div>' + escapeHtml(msg) + '</div></div>';
}
function autoResize() {
  try {
    if (typeof BX24 === 'undefined' || !BX24.resizeWindow) return;
    var h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight, 700);
    BX24.resizeWindow(document.body.scrollWidth, Math.max(h, 900));
  } catch (e) { /* ignore */ }
}

BX24.init(function() {
  try {
    var placement = BX24.placement.info();
    var rawId = placement && placement.options && placement.options.ID;
    state.leadId = parseInt(rawId, 10) || 0;

    if (!state.leadId) {
      renderPrompt();
      var poll = setInterval(function() {
        try {
          var p = BX24.placement.info();
          var id = parseInt(p && p.options && p.options.ID, 10) || 0;
          if (id) { state.leadId = id; clearInterval(poll); loadData().then(render).catch(function(e){ renderError(e.message||'Ошибка загрузки'); }); }
        } catch (e) { /* ignore */ }
      }, 2000);
      return;
    }

    loadData().then(render).catch(function(e){ renderError(e.message || 'Ошибка загрузки'); });
  } catch (e) {
    renderError(e.message || 'Ошибка инициализации');
  }
});
</script>
</body>
</html>
